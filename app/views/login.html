<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Connexion</h1>
          <form id="loginForm">
            <ul>
              <label for="email">E-mail :</label>
              <input type="text" id="email" name="email" required />
              <label for="mdp">Mot de passe :</label>
              <input type="password" id="mdp" name="password" required />
            </ul>
            <button type="submit">Envoyer</button>
          </form>
          <p id="message" style="color: red; margin-top: 10px"></p>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pedagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>

    <script>
      const loginForm = document.getElementById("loginForm");
      const messageElement = document.getElementById("message");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("mdp").value;

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (response.ok && data.token) {
            localStorage.setItem("token", data.token);

            if (data.refreshToken) {
              localStorage.setItem("refreshToken", data.refreshToken);
            }

            window.location.href = "/";
          } else {
            messageElement.textContent =
              data.error || "Identifiants incorrects";
          }
        } catch (error) {
          console.error("Erreur login:", error);
          messageElement.textContent = "Erreur de connexion au serveur";
        }
      });
    </script>
  </body>
</html>
